version: '3.8'

services:
  # ==========================================
  # Infrastructure Layer (基础设施层)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: pediatric_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pediatric_secret_pg}
      POSTGRES_DB: ${POSTGRES_DB:-pediatric_ai_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: pediatric_redis
    restart: always
    ports:
      - "6379:6379"

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: pediatric_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: pediatric_minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.3.0
    container_name: pediatric_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # ==========================================
  # Business Layer (业务服务层)
  # ==========================================
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile.ai-engine
    container_name: pediatric_ai_engine
    restart: always
    env_file:
      - ./services/ai-engine/.env
    ports:
      - "8000:8000"
    depends_on:
      - milvus-standalone

  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    container_name: pediatric_bff
    restart: always
    env_file:
      - ./apps/bff/.env
    ports:
      - "3000:3000"
    depends_on:
      - ai-engine
      - redis
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pediatric_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - bff

  # ==========================================
  # APM & Observability Layer (可观测性监控层)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: pediatric_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:10.0.3
    container_name: pediatric_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=pediatric_admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
  prometheus_data:
  grafana_data:
